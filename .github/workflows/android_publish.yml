name: Android Build & Publish

on:
  workflow_dispatch: 
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 1. RÉCUPÉRATION OU INCRÉMENTATION DE LA VERSION
      - name: Process Version
        id: version_step
        run: |
          # Extraire le versionName actuel (ex: 1.0.3)
          VNAME=$(grep "versionName" app/build.gradle | sed 's/.*"\(.*\)".*/\1/')
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Séparer et incrémenter le Patch
            MAJOR=$(echo $VNAME | cut -d. -f1)
            MINOR=$(echo $VNAME | cut -d. -f2)
            PATCH=$(echo $VNAME | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            VNAME="$MAJOR.$MINOR.$NEW_PATCH"
            
            # Incrémenter le versionCode
            VCODE=$(grep "versionCode" app/build.gradle | sed 's/[^0-9]*//g')
            NEW_VCODE=$((VCODE + 1))
            
            # Appliquer les changements dans le fichier
            sed -i "s/versionName \".*\"/versionName \"$VNAME\"/" app/build.gradle
            sed -i "s/versionCode .*/versionCode $NEW_VCODE/" app/build.gradle
            
            # Configurer Git et pousser le changement
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add app/build.gradle
            git commit -m "chore: bump version to $VNAME"
            git tag "v$VNAME"
            git push origin main
            git push origin "v$VNAME"
            
            echo "TAG_TO_USE=v$VNAME" >> $GITHUB_ENV
          else
            # Si c'est un push de tag, on utilise le tag existant
            echo "TAG_TO_USE=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 2. CRÉATION DE LA RELEASE AVEC LE TAG CORRESPONDANT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_TO_USE }}
          name: Release ${{ env.TAG_TO_USE }}
          files: app/build/outputs/apk/debug/*.apk 
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
